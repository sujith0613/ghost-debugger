# storage/prometheus/prometheus.yml
#
# Prometheus scrape configuration for Ghost Debugger.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'development'
    project: 'ghost-debugger'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'ghost_debugger_gateway'
    static_configs:
      - targets: ['gateway:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'ghost_debugger_agents'
    static_configs:
      - targets: ['agents:9001']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'test_services'
    static_configs:
      - targets:
          - 'service_a:8081'
          - 'service_b:8082'
          - 'service_c:8083'
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'failure_injector'
    static_configs:
      - targets: ['failure_injector:8099']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
