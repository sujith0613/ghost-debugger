# observability/otel-collector/config.yml
#
# OpenTelemetry Collector configuration.
#
# NOTE: For this project, the Go gateway IS the collector for test services.
# Test services send spans directly to the gateway's OTLP gRPC port (4317).
# The gateway forwards to Jaeger.
#
# This collector config is provided for a future architecture where an
# independent OTEL collector sits between services and backends.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger]
