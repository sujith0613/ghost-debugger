syntax = "proto3";

package agent;

option go_package = "github.com/sujithm/ghost-debugger/proto/agent";

// ═══════════════════════════════════════════════════════════════════════════════
// ANALYSIS REQUEST AND RESPONSE
// ═══════════════════════════════════════════════════════════════════════════════

message AnalysisRequest {
  string          incident_id         = 1;
  string          trigger_type        = 2;
  string          trigger_description = 3;
  repeated string services            = 4;
  int64           detected_at_ns      = 5;
  int64           analysis_window_ns  = 6;
}

message AgentFinding {
  string agent_name    = 1;
  string finding       = 2;
  double confidence    = 3;
  int64  completed_at  = 4;
  bool   had_error     = 5;
  string error_detail  = 6;
}

message AnalysisResponse {
  string            incident_id           = 1;
  repeated AgentFinding findings          = 2;
  string            root_cause            = 3;
  double            root_cause_confidence = 4;
  string            postmortem_markdown   = 5;
  repeated string   similar_incidents     = 6;
  int64             analysis_duration_ms  = 7;
  string            status                = 8;
  string            signal_completeness   = 9;
}

// ═══════════════════════════════════════════════════════════════════════════════
// PROGRESS UPDATES (SERVER STREAMING)
// ═══════════════════════════════════════════════════════════════════════════════

message AnalysisProgressUpdate {
  string incident_id  = 1;
  string agent_name   = 2;
  string status       = 3;
  string detail       = 4;
  int64  timestamp_ns = 5;
}

// ═══════════════════════════════════════════════════════════════════════════════
// PING-PONG (for cross-language gRPC verification)
// ═══════════════════════════════════════════════════════════════════════════════

message PingRequest {
  string message   = 1;
  int64  sent_at   = 2;
}

message PongResponse {
  string original_message  = 1;
  string server_language   = 2;
  int64  received_at       = 3;
  int64  replied_at        = 4;
  int64  round_trip_ms     = 5;
}

// ═══════════════════════════════════════════════════════════════════════════════
// SERVICE DEFINITION
// ═══════════════════════════════════════════════════════════════════════════════

service AgentService {
  rpc AnalyzeIncident (AnalysisRequest) returns (AnalysisResponse);
  rpc AnalyzeIncidentWithProgress (AnalysisRequest)
      returns (stream AnalysisProgressUpdate);
  rpc Ping (PingRequest) returns (PongResponse);
}
